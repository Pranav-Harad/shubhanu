services:
  # -------------------------------------------------------------
  # 1. DATABASES & CACHING
  # -------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: shubhanu-postgres
    restart: always
    environment:
      POSTGRES_USER: shubhanu_admin
      POSTGRES_PASSWORD: admin_password_secure_2026
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - shubhanu-network

  mongodb:
    image: mongo:6.0
    container_name: shubhanu-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: shubhanu_mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password_secure_2026
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - shubhanu-network

  redis:
    image: redis:7-alpine
    container_name: shubhanu-redis
    restart: always
    command: redis-server --requirepass redis_password_secure_2026
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shubhanu-network

  # -------------------------------------------------------------
  # 2. APACHE KAFKA EVENT STREAM BROKER
  # -------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shubhanu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - shubhanu-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shubhanu-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - shubhanu-network

  # -------------------------------------------------------------
  # 3. KONG API GATEWAY
  # -------------------------------------------------------------
  kong:
    image: kong:alpine
    container_name: shubhanu-kong-gateway
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"   # Public HTTP Entrypoint
      - "8443:8443"   # Public HTTPS Entrypoint
      - "8001:8001"   # Admin API (Local Only)
    volumes:
      - ../kong:/usr/local/kong/declarative
    depends_on:
      - postgres
      - mongodb
      - redis
    networks:
      - shubhanu-network

networks:
  shubhanu-network:
    name: shubhanu-network
    driver: bridge

volumes:
  postgres-data:
    driver: local
  mongo-data:
    driver: local
  redis-data:
    driver: local
