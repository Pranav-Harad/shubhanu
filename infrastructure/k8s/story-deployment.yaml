# -------------------------------------------------------------
# SHUBHANU Story Engine Service Kubernetes Deployment Manifest
# Production-ready EKS configuration
# -------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: story-service-deployment
  namespace: shubhanu-prod
  labels:
    app: story-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: story-service
  template:
    metadata:
      labels:
        app: story-service
    spec:
      containers:
        - name: story-service
          image: 123B1F028.dkr.ecr.ap-south-1.amazonaws.com/shubhanu-story-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: shubhanu-secrets
                  key: mongo-uri
          resources:
            limits:
              cpu: "400m"
              memory: "256Mi"
            requests:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: story-service-svc
  namespace: shubhanu-prod
spec:
  selector:
    app: story-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
